<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0c10;
    --surface: #0f1318;
    --surface2: #151b22;
    --border: #1e2d3d;
    --accent: #00d4ff;
    --accent2: #0088bb;
    --accent-dim: rgba(0, 212, 255, 0.08);
    --text: #e2eaf2;
    --text-muted: #5a7a90;
    --text-dim: #2a4055;
    --user-bg: #0d2235;
    --user-border: #1a4060;
    --ai-bg: #0f1a22;
    --font-mono: 'Share Tech Mono', monospace;
    --font-ui: 'Exo 2', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 56px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    border: 1.5px solid var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .logo-icon::before {
    content: '';
    width: 10px;
    height: 10px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .logo-text {
    font-family: var(--font-mono);
    font-size: 18px;
    color: var(--accent);
    letter-spacing: 4px;
  }

  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    background: #00ff88;
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  /* Model selector */
  .model-bar {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-muted);
  }

  .model-bar select {
    background: var(--surface2);
    color: var(--accent);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 8px;
    font-family: var(--font-mono);
    font-size: 12px;
    outline: none;
    cursor: pointer;
  }

  .model-bar select:focus {
    border-color: var(--accent2);
  }

  /* Chat area */
  #chat {
    position: relative;
    z-index: 1;
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Messages */
  .msg {
    display: flex;
    gap: 12px;
    max-width: 820px;
    animation: fadeUp 0.2s ease-out;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.ai { align-self: flex-start; }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
    font-size: 11px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg.user .avatar {
    background: var(--user-bg);
    color: var(--accent);
    border-color: var(--user-border);
  }

  .msg.ai .avatar {
    background: var(--accent-dim);
    color: var(--accent);
    border-color: var(--accent2);
  }

  .bubble {
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.6;
    max-width: 680px;
    word-break: break-word;
  }

  .msg.user .bubble {
    background: var(--user-bg);
    border: 1px solid var(--user-border);
    color: var(--text);
    border-bottom-right-radius: 2px;
  }

  .msg.ai .bubble {
    background: var(--ai-bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 2px;
    font-family: var(--font-ui);
  }

  .msg.ai .bubble code {
    font-family: var(--font-mono);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 12px;
    color: var(--accent);
  }

  .msg.ai .bubble pre {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    margin: 8px 0;
    overflow-x: auto;
    font-family: var(--font-mono);
    font-size: 12px;
    color: #a8d8ea;
    line-height: 1.5;
  }

  .msg.ai .bubble pre code {
    background: none;
    border: none;
    padding: 0;
    color: inherit;
    font-size: inherit;
  }

  /* Thinking indicator */
  .thinking {
    display: flex;
    gap: 5px;
    padding: 4px 0;
  }

  .thinking span {
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: think 1.2s ease-in-out infinite;
    opacity: 0.3;
  }

  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes think {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.3); }
  }

  /* Welcome screen */
  #welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 16px;
    text-align: center;
    padding: 40px;
  }

  .welcome-icon {
    width: 64px;
    height: 64px;
    border: 2px solid var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    margin-bottom: 8px;
  }

  .welcome-icon::before {
    content: '';
    width: 20px;
    height: 20px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  .welcome-icon::after {
    content: '';
    position: absolute;
    inset: -8px;
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: 50%;
    animation: ripple 2s ease-out infinite;
  }

  @keyframes ripple {
    0% { transform: scale(1); opacity: 0.5; }
    100% { transform: scale(1.3); opacity: 0; }
  }

  .welcome-title {
    font-family: var(--font-mono);
    font-size: 28px;
    color: var(--accent);
    letter-spacing: 8px;
  }

  .welcome-sub {
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 1px;
    font-family: var(--font-mono);
  }

  .quick-prompts {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 16px;
    max-width: 560px;
  }

  .quick-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-family: var(--font-ui);
    cursor: pointer;
    transition: all 0.15s;
  }

  .quick-btn:hover {
    border-color: var(--accent2);
    color: var(--accent);
    background: var(--accent-dim);
  }

  /* Input area */
  footer {
    position: relative;
    z-index: 10;
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    max-width: 820px;
    margin: 0 auto;
  }

  #input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 14px;
    resize: none;
    outline: none;
    min-height: 48px;
    max-height: 160px;
    line-height: 1.5;
    transition: border-color 0.15s;
  }

  #input:focus { border-color: var(--accent2); }
  #input::placeholder { color: var(--text-dim); }

  #send {
    width: 48px;
    height: 48px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  #send:hover { background: #00b8d9; transform: scale(1.03); }
  #send:active { transform: scale(0.97); }
  #send:disabled { background: var(--surface2); cursor: not-allowed; transform: none; }

  #send svg { width: 18px; height: 18px; fill: #000; }

  .hint {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    text-align: center;
    margin-top: 8px;
    letter-spacing: 1px;
  }

  /* Error */
  .error-bubble {
    background: #1a0a0a;
    border: 1px solid #3d1515;
    color: #ff6b6b;
    padding: 10px 14px;
    border-radius: 6px;
    font-size: 13px;
    font-family: var(--font-mono);
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon"></div>
    <span class="logo-text">JARVIS</span>
  </div>
  <div class="status">
    <div class="status-dot"></div>
    SYSTEM ONLINE — LOCAL AI
  </div>
</header>

<div class="model-bar">
  MODEL:
  <select id="model-select">
    <option value="chat-ai">chat-ai (Qwen2 7B)</option>
    <option value="code-ai">code-ai (Qwen2 7B Coder)</option>
    <option value="sh-ai">sh-ai (Phi-3 Mini)</option>
    <option value="translate-ai">translate-ai (TranslateGemma 4B)</option>
    <option value="mistral:7b-instruct">mistral:7b-instruct</option>
  </select>
  &nbsp;|&nbsp; ENDPOINT: localhost:11434
</div>

<div id="chat">
  <div id="welcome">
    <div class="welcome-icon"></div>
    <div class="welcome-title">JARVIS</div>
    <div class="welcome-sub">JUST A RATHER VERY INTELLIGENT SYSTEM — RUNNING LOCALLY</div>
    <div class="quick-prompts">
      <button class="quick-btn" onclick="quickSend('Explain what a neural network is in simple terms')">What is a neural network?</button>
      <button class="quick-btn" onclick="quickSend('Write a Python function to reverse a string')">Python: reverse a string</button>
      <button class="quick-btn" onclick="quickSend('What are the best practices for writing clean code?')">Clean code tips</button>
      <button class="quick-btn" onclick="quickSend('Explain the difference between RAM and storage')">RAM vs storage</button>
    </div>
  </div>
</div>

<footer>
  <div class="input-row">
    <textarea id="input" placeholder="Awaiting your command..." rows="1"></textarea>
    <button id="send" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 21l21-9L2 3v7l15 2-15 2z"/>
      </svg>
    </button>
  </div>
  <div class="hint">ENTER to send &nbsp;·&nbsp; SHIFT+ENTER for new line &nbsp;·&nbsp; ALL PROCESSING LOCAL</div>
</footer>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const welcome = document.getElementById('welcome');
const modelSelect = document.getElementById('model-select');

const OLLAMA_URL = 'http://localhost:11434/api/chat';
let messages = [];
let isStreaming = false;

input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 160) + 'px';
});

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!isStreaming) sendMessage();
  }
});

function quickSend(text) {
  input.value = text;
  sendMessage();
}

function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function formatMessage(text) {
  // Code blocks
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    return `<pre><code>${escapeHtml(code.trim())}</code></pre>`;
  });
  // Inline code
  text = text.replace(/`([^`]+)`/g, (_, code) => `<code>${escapeHtml(code)}</code>`);
  // Bold
  text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  // Newlines
  text = text.replace(/\n/g, '<br>');
  return text;
}

function addMessage(role, content) {
  if (welcome.parentElement) welcome.remove();

  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'user' ? 'YOU' : 'AI';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  if (role === 'ai' && content === null) {
    bubble.innerHTML = '<div class="thinking"><span></span><span></span><span></span></div>';
  } else {
    bubble.innerHTML = role === 'ai' ? formatMessage(content) : escapeHtml(content);
  }

  div.appendChild(avatar);
  div.appendChild(bubble);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return bubble;
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text || isStreaming) return;

  isStreaming = true;
  sendBtn.disabled = true;
  input.value = '';
  input.style.height = 'auto';

  addMessage('user', text);
  messages.push({ role: 'user', content: text });

  const aiBubble = addMessage('ai', null);

  try {
    const response = await fetch(OLLAMA_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: modelSelect.value,
        messages: messages,
        stream: true
      })
    });

    if (!response.ok) {
      throw new Error(`HTTP ${response.status}: ${response.statusText}`);
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';

    aiBubble.innerHTML = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value);
      const lines = chunk.split('\n').filter(l => l.trim());

      for (const line of lines) {
        try {
          const data = JSON.parse(line);
          if (data.message?.content) {
            fullText += data.message.content;
            aiBubble.innerHTML = formatMessage(fullText);
            chat.scrollTop = chat.scrollHeight;
          }
        } catch {}
      }
    }

    messages.push({ role: 'assistant', content: fullText });

  } catch (err) {
    aiBubble.innerHTML = `<div class="error-bubble">⚠ CONNECTION ERROR<br><br>${escapeHtml(err.message)}<br><br>Make sure Ollama is running:<br><code>OLLAMA_HOST=0.0.0.0:11434 ollama serve</code></div>`;
  }

  isStreaming = false;
  sendBtn.disabled = false;
  input.focus();
}
</script>
</body>
</html>
